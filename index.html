<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Резюме — Денис</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      padding: 40px 20px;
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }

    /* HEADER */
    .header {
      background: linear-gradient(135deg, #1e293b, #334155);
      color: #fff;
      padding: 40px 40px 32px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 { font-size: 1.8rem; font-weight: 700; }
    .header .role { color: #94a3b8; margin-top: 4px; font-size: 1rem; }

    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.875rem;
      color: #cbd5e1;
    }

    .contact-item .icon { font-size: 1rem; }

    /* BODY */
    .body {
      display: grid;
      grid-template-columns: 1fr 260px;
    }

    .main { padding: 32px 32px 32px 40px; }
    .sidebar { padding: 32px 32px 32px 0; border-left: 1px solid #f1f5f9; }

    /* SECTION */
    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6366f1;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e7ff;
    }

    /* PROJECT CARD */
    .job-card { margin-bottom: 20px; }
    .job-card:last-child { margin-bottom: 0; }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .job-title { font-weight: 700; font-size: 0.95rem; }
    .job-company { color: #6366f1; font-size: 0.85rem; margin-top: 2px; }
    .job-period {
      font-size: 0.75rem;
      color: #94a3b8;
      white-space: nowrap;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .job-desc {
      margin-top: 8px;
      font-size: 0.875rem;
      color: #475569;
      line-height: 1.6;
    }

    /* SKILL BADGE */
    .skill-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .skill-name { font-size: 0.875rem; font-weight: 500; }

    .skill-bar {
      width: 100px;
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: 99px;
      background: #6366f1;
    }

    /* INFO ROW */
    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.875rem;
    }

    .info-label {
      color: #94a3b8;
      min-width: 80px;
      font-size: 0.8rem;
    }

    .info-value { color: #1e293b; font-weight: 500; }

    /* TAG */
    .tag {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      padding: 3px 10px;
      margin: 3px 3px 3px 0;
    }

    /* NO EXPERIENCE */
    .no-exp {
      font-size: 0.875rem;
      color: #94a3b8;
      font-style: italic;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    // ─────────────────────────────────────────────
    // КОМПОНЕНТЫ — один шаблон, разные пропсы
    // ─────────────────────────────────────────────

    function ContactItem({ icon, text }) {
      return (
        <div className="contact-item">
          <span className="icon">{icon}</span>
          <span>{text}</span>
        </div>
      );
    }

    function ProjectCard({ title, tech, period, description }) {
      return (
        <div className="job-card">
          <div className="job-header">
            <div>
              <div className="job-title">{title}</div>
              <div className="job-company">{tech}</div>
            </div>
            <div className="job-period">{period}</div>
          </div>
          <div className="job-desc">{description}</div>
        </div>
      );
    }

    function SkillBadge({ name, level }) {
      return (
        <div className="skill-badge">
          <span className="skill-name">{name}</span>
          <div className="skill-bar">
            <div className="skill-fill" style={{ width: `${level}%` }} />
          </div>
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div className="info-row">
          <span className="info-label">{label}</span>
          <span className="info-value">{value}</span>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div className="section">
          <div className="section-title">{title}</div>
          {children}
        </div>
      );
    }

    function Tag({ text }) {
      return <span className="tag">{text}</span>;
    }

    // ─────────────────────────────────────────────
    // ДАННЫЕ
    // ─────────────────────────────────────────────

    const person = {
      name: 'Денис',
      initials: 'Д',
      role: 'Frontend-разработчик',
      contacts: [
        { icon: '📧', text: 'kolerot51@gmail.com' },
        { icon: '🐙', text: 'github.com/ZEwsa1-hash' },
      ],
    };

    const projects = [
      {
        title: 'Notes App',
        tech: 'JavaScript',
        period: '2025',
        description: 'Приложение для заметок с возможностью добавления, редактирования и удаления записей.',
      },
      {
        title: 'Points of Interest',
        tech: 'JavaScript',
        period: '2025',
        description: 'Интерактивная карта с метками интересных мест.',
      },
      {
        title: 'Wishess',
        tech: 'JavaScript',
        period: '2025',
        description: 'Приложение для ведения списка желаний.',
      },
      {
        title: 'Cars App',
        tech: 'HTML / CSS',
        period: '2024',
        description: 'Каталог автомобилей — учебный проект по вёрстке.',
      },
    ];

    const skills = [
      { name: 'HTML / CSS', level: 75 },
      { name: 'JavaScript', level: 65 },
      { name: 'React', level: 50 },
      { name: 'Git', level: 55 },
      { name: 'Tailwind CSS', level: 45 },
      { name: 'REST API', level: 45 },
    ];

    const info = [
      { label: 'Возраст',    value: '19 лет' },
      { label: 'Опыт',       value: 'Начинающий' },
      { label: 'Формат',     value: 'Remote / офис' },
      { label: 'Английский', value: 'B1' },
    ];

    const education = [
      {
        title: 'Frontend-разработка',
        tech: 'TAD',
        period: '2024 — сейчас',
        description: 'Практический курс по современной фронтенд-разработке: HTML, CSS, JavaScript, React.',
      },
    ];

    // ─────────────────────────────────────────────
    // ГЛАВНЫЙ КОМПОНЕНТ
    // ─────────────────────────────────────────────

    function App() {
      return (
        <div className="page">

          {/* ШАПКА */}
          <div className="header">
            <div className="header-top">
              <div className="avatar">{person.initials}</div>
              <div>
                <h1>{person.name}</h1>
                <div className="role">{person.role}</div>
              </div>
            </div>
            <div className="contacts">
              {person.contacts.map((c, i) => (
                <ContactItem key={i} icon={c.icon} text={c.text} />
              ))}
            </div>
          </div>

          <div className="body">

            {/* ЛЕВАЯ КОЛОНКА */}
            <div className="main">

              <Section title="Опыт работы">
                <p className="no-exp">Коммерческого опыта пока нет — активно развиваю навыки и ищу первую возможность.</p>
              </Section>

              <Section title="Учебные проекты">
                {projects.map((p, i) => (
                  <ProjectCard
                    key={i}
                    title={p.title}
                    tech={p.tech}
                    period={p.period}
                    description={p.description}
                  />
                ))}
              </Section>

              <Section title="Образование">
                {education.map((e, i) => (
                  <ProjectCard
                    key={i}
                    title={e.title}
                    tech={e.tech}
                    period={e.period}
                    description={e.description}
                  />
                ))}
              </Section>

            </div>

            {/* ПРАВАЯ КОЛОНКА */}
            <div className="sidebar">

              <Section title="Навыки">
                {skills.map((s, i) => (
                  <SkillBadge key={i} name={s.name} level={s.level} />
                ))}
              </Section>

              <Section title="О себе">
                {info.map((r, i) => (
                  <InfoRow key={i} label={r.label} value={r.value} />
                ))}
              </Section>

              <Section title="Ищу">
                <Tag text="Стажировка" />
                <Tag text="Junior позиция" />
                <Tag text="Практика" />
              </Section>

            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
