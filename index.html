<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Резюме — Денис</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f1f5f9;
      color: #1e293b;
      padding: 40px 20px;
    }

    .page {
      max-width: 780px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 4px 32px rgba(0,0,0,0.10);
    }

    .header {
      background: linear-gradient(135deg, #1e293b, #334155);
      color: #fff;
      padding: 40px 40px 32px;
    }

    .header-top {
      display: flex;
      align-items: center;
      gap: 24px;
    }

    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #6366f1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      font-weight: 700;
      color: #fff;
      flex-shrink: 0;
    }

    .header h1 { font-size: 1.8rem; font-weight: 700; }
    .header .role { color: #94a3b8; margin-top: 4px; font-size: 1rem; }

    .contacts {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      margin-top: 20px;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 7px;
      font-size: 0.875rem;
      color: #cbd5e1;
    }

    .contact-item .icon { display: flex; align-items: center; opacity: 0.7; }
    .contact-item .icon svg { width: 14px; height: 14px; fill: currentColor; }

    .body {
      display: grid;
      grid-template-columns: 1fr 260px;
    }

    .main { padding: 32px 32px 32px 40px; }
    .sidebar { padding: 32px 32px 32px 0; border-left: 1px solid #f1f5f9; }

    .section { margin-bottom: 28px; }
    .section-title {
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: #6366f1;
      margin-bottom: 14px;
      padding-bottom: 6px;
      border-bottom: 2px solid #e0e7ff;
    }

    .job-card { margin-bottom: 20px; }
    .job-card:last-child { margin-bottom: 0; }

    .job-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
    }

    .job-title { font-weight: 700; font-size: 0.95rem; }
    .job-company { color: #6366f1; font-size: 0.85rem; margin-top: 2px; }
    .job-period {
      font-size: 0.75rem;
      color: #94a3b8;
      white-space: nowrap;
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 20px;
      padding: 2px 10px;
    }

    .job-desc {
      margin-top: 8px;
      font-size: 0.875rem;
      color: #475569;
      line-height: 1.6;
    }

    .skill-badge {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    .skill-name { font-size: 0.875rem; font-weight: 500; }

    .skill-bar {
      width: 100px;
      height: 6px;
      background: #e2e8f0;
      border-radius: 99px;
      overflow: hidden;
    }

    .skill-fill {
      height: 100%;
      border-radius: 99px;
      background: #6366f1;
    }

    .info-row {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 10px;
      font-size: 0.875rem;
    }

    .info-label {
      color: #94a3b8;
      min-width: 80px;
      font-size: 0.8rem;
    }

    .info-value { color: #1e293b; font-weight: 500; }

    .tag {
      display: inline-block;
      background: #ede9fe;
      color: #6d28d9;
      font-size: 0.75rem;
      font-weight: 600;
      border-radius: 6px;
      padding: 3px 10px;
      margin: 3px 3px 3px 0;
    }

    .no-exp {
      font-size: 0.875rem;
      color: #94a3b8;
      font-style: italic;
      padding: 12px 0;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">

    const icons = {
      email: (
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M20 4H4C2.9 4 2 4.9 2 6v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4-8 5-8-5V6l8 5 8-5v2z"/>
        </svg>
      ),
      github: (
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 2C6.477 2 2 6.477 2 12c0 4.418 2.865 8.166 6.839 9.489.5.092.682-.217.682-.482 0-.237-.009-.868-.013-1.703-2.782.604-3.369-1.342-3.369-1.342-.454-1.155-1.11-1.463-1.11-1.463-.908-.62.069-.608.069-.608 1.003.07 1.531 1.03 1.531 1.03.892 1.529 2.341 1.087 2.91.832.092-.647.35-1.088.636-1.338-2.22-.253-4.555-1.11-4.555-4.943 0-1.091.39-1.984 1.029-2.683-.103-.253-.446-1.27.098-2.647 0 0 .84-.269 2.75 1.025A9.578 9.578 0 0 1 12 6.836a9.59 9.59 0 0 1 2.504.337c1.909-1.294 2.747-1.025 2.747-1.025.546 1.377.202 2.394.1 2.647.64.699 1.028 1.592 1.028 2.683 0 3.842-2.339 4.687-4.566 4.935.359.309.678.919.678 1.852 0 1.336-.012 2.415-.012 2.743 0 .267.18.579.688.481C19.138 20.163 22 16.418 22 12c0-5.523-4.477-10-10-10z"/>
        </svg>
      ),
    };

    function ContactItem({ icon, text }) {
      return (
        <div className="contact-item">
          <span className="icon">{icons[icon]}</span>
          <span>{text}</span>
        </div>
      );
    }

    function ProjectCard({ title, tech, period, description }) {
      return (
        <div className="job-card">
          <div className="job-header">
            <div>
              <div className="job-title">{title}</div>
              <div className="job-company">{tech}</div>
            </div>
            <div className="job-period">{period}</div>
          </div>
          <div className="job-desc">{description}</div>
        </div>
      );
    }

    function SkillBadge({ name, level }) {
      return (
        <div className="skill-badge">
          <span className="skill-name">{name}</span>
          <div className="skill-bar">
            <div className="skill-fill" style={{ width: `${level}%` }} />
          </div>
        </div>
      );
    }

    function InfoRow({ label, value }) {
      return (
        <div className="info-row">
          <span className="info-label">{label}</span>
          <span className="info-value">{value}</span>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div className="section">
          <div className="section-title">{title}</div>
          {children}
        </div>
      );
    }

    function Tag({ text }) {
      return <span className="tag">{text}</span>;
    }

    const person = {
      name: 'Денис',
      initials: 'Д',
      role: 'Frontend-разработчик',
      contacts: [
        { icon: 'email', text: 'kolerot51@gmail.com' },
        { icon: 'github', text: 'github.com/ZEwsa1-hash' },
      ],
    };

    const projects = [
      {
        title: 'Notes App',
        tech: 'JavaScript',
        period: '2026',
        description: 'Приложение для заметок с возможностью добавления, редактирования и удаления записей.',
      },
      {
        title: 'Points of Interest',
        tech: 'JavaScript',
        period: '2026',
        description: 'Интерактивная карта с метками интересных мест.',
      },
      {
        title: 'Wishess',
        tech: 'JavaScript',
        period: '2026',
        description: 'Приложение для ведения списка желаний.',
      },
      {
        title: 'Cars App',
        tech: 'HTML / CSS',
        period: '2026',
        description: 'Каталог автомобилей — учебный проект по вёрстке.',
      },
    ];

    const skills = [
      { name: 'HTML / CSS', level: 75 },
      { name: 'JavaScript', level: 65 },
      { name: 'React', level: 50 },
      { name: 'Git', level: 55 },
      { name: 'Tailwind CSS', level: 45 },
      { name: 'REST API', level: 45 },
    ];

    const info = [
      { label: 'Возраст',    value: '19 лет' },
      { label: 'Опыт',       value: 'Начинающий' },
      { label: 'Формат',     value: 'Удалённо / офис' },
      { label: 'Английский', value: 'B1' },
    ];

    const education = [
      {
        title: 'Frontend-разработка',
        tech: 'TAD',
        period: '2026 — сейчас',
        description: 'Практический курс по современной фронтенд-разработке: HTML, CSS, JavaScript, React.',
      },
    ];

    function App() {
      return (
        <div className="page">

          <div className="header">
            <div className="header-top">
              <div className="avatar">{person.initials}</div>
              <div>
                <h1>{person.name}</h1>
                <div className="role">{person.role}</div>
              </div>
            </div>
            <div className="contacts">
              {person.contacts.map((c, i) => (
                <ContactItem key={i} icon={c.icon} text={c.text} />
              ))}
            </div>
          </div>

          <div className="body">
            <div className="main">

              <Section title="Опыт работы">
                <p className="no-exp">В процессе поиска первой позиции.</p>
              </Section>

              <Section title="Учебные проекты">
                {projects.map((p, i) => (
                  <ProjectCard
                    key={i}
                    title={p.title}
                    tech={p.tech}
                    period={p.period}
                    description={p.description}
                  />
                ))}
              </Section>

              <Section title="Образование">
                {education.map((e, i) => (
                  <ProjectCard
                    key={i}
                    title={e.title}
                    tech={e.tech}
                    period={e.period}
                    description={e.description}
                  />
                ))}
              </Section>

            </div>

            <div className="sidebar">

              <Section title="Навыки">
                {skills.map((s, i) => (
                  <SkillBadge key={i} name={s.name} level={s.level} />
                ))}
              </Section>

              <Section title="О себе">
                {info.map((r, i) => (
                  <InfoRow key={i} label={r.label} value={r.value} />
                ))}
              </Section>

              <Section title="Ищу">
                <Tag text="Стажировка" />
                <Tag text="Junior позиция" />
                <Tag text="Практика" />
              </Section>

            </div>
          </div>

        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
